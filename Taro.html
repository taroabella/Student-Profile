<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-top: 10px;
        }

        h1 {
            margin: 10px 0;
        }

        h2 {
            color: #333;
            margin-top: 20px;
        }

        p {
            color: #555;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: #4facfe;
            color: white;
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
        }

        .contact {
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Juan Dela Cruz</h1>

        <img src="https://via.placeholder.com/150" alt="Profile Picture">

        <h2>About Me</h2>
        <p>I am a passionate student who loves coding and creating simple web projects.</p>

        <h2>Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>Basic JavaScript</li>
        </ul>

        <h2>Contact</h2>
        <div class="contact">
            <p>Email: juan@email.com</p>
            <a href="#" class="btn">Message Me</a>
        </div>
    </div>

</body>
</html>
